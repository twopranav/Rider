<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoned Ride-Hailing Dashboard (Dark Mode)</title>
    <style>
        /* --- DARK MODE BASE STYLES --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0;
            padding: 20px; 
        }
        h1 { text-align: center; color: #ffffff; }
        
        .container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        
        /* Dark Panels */
        .panel { 
            background: #1e1e1e; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
            padding: 20px; 
            width: 350px; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #333;
        }
        
        /* Headers */
        h2 { 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
            margin-top: 0; 
            color: #ffffff; 
        }
        .rider-header { color: #4dabf7; border-bottom-color: #4dabf7; }
        .driver-header { color: #69db7c; border-bottom-color: #69db7c; }
        .queue-header { color: #ff8787; border-bottom-color: #ff8787; }

        /* Slogan */
        .slogan {
            font-size: 0.8em; 
            color: #aaa; /* Lighter gray for dark mode */
            margin-top: 0; 
            margin-bottom: 20px; 
            font-style: italic;
        }

        /* Inputs & Buttons */
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; color: #ccc; }
        
        input { 
            width: 90%; 
            padding: 8px; 
            margin-bottom: 5px; 
            background-color: #2c2c2c; 
            border: 1px solid #444; 
            color: white;
            border-radius: 4px; 
        }
        input:focus { outline: none; border-color: #007bff; }

        button { width: 100%; padding: 10px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:hover { opacity: 0.9; }

        /* Adjusted button colors for dark mode contrast */
        .btn-connect { background-color: #495057; }
        .btn-rider { background-color: #007bff; }
        .btn-driver { background-color: #28a745; }
        .btn-reg { background-color: #138496; font-size: 0.8em; margin-bottom: 10px; }

        /* Logs & Lists */
        .log-box { 
            height: 250px; 
            overflow-y: auto; 
            background: #000000; 
            border: 1px solid #444; 
            padding: 10px; 
            font-size: 0.85em; 
            font-family: monospace; 
            color: #ddd;
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .success { color: #69db7c; } /* Brighter green */
        .info { color: #74c0fc; }    /* Brighter blue */
        .error { color: #ff8787; }   /* Brighter red */
        .vip { color: #ffd43b; font-weight: bold; } /* Gold */

        /* Queue Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #444; color: #ddd; }
        th { background-color: #2c2c2c; color: #fff; }
        
        /* VIP Row - Dark Gold Background */
        tr.vip-row { background-color: #4d3e00; } 
        tr.vip-row td { color: #ffd43b; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🚖 Zoned Ride-Hailing System</h1>

    <div class="container">
        
        <div class="panel">
            <h2 class="rider-header" style="margin-bottom: 5px;">👤 Riders</h2>
            
            <p class="slogan">
                "Your ride on time, every time."
            </p>
            
            <div class="control-group">
                <label>Client ID:</label>
                <input type="number" id="riderId" value="1">
                <button class="btn-reg" onclick="registerClient()">1. Register (If New)</button>
                <button class="btn-connect" onclick="connectRider()" id="btnConnRider">2. Connect WS</button>
            </div>

            <div class="control-group">
                <label>From Zone (1-10):</label>
                <input type="number" id="startZone" value="1">
                <label>To Zone (1-10):</label>
                <input type="number" id="dropZone" value="5">
                <button class="btn-rider" onclick="requestRide()">Request Normal Ride</button>
            </div>

            <div class="log-box" id="riderLog">
                <div class="log-entry">Waiting to connect...</div>
            </div>
        </div>

        <div class="panel">
            <h2 class="driver-header">🚗 Drivers</h2>

            <div class="control-group">
                <label>Driver ID:</label>
                <input type="number" id="driverId" value="101">
                <button class="btn-reg" onclick="registerDriver()">1. Register (If New)</button>
                <button class="btn-connect" onclick="connectDriver()" id="btnConnDriver">2. Connect WS</button>
            </div>

            <div class="control-group">
                <label>Target Ride ID:</label>
                <input type="number" id="targetRideId" placeholder="Ride ID from Log">
                <button class="btn-driver" onclick="acceptRide()">Accept Normal Ride</button>
                <button class="btn-driver" style="background-color: #fd7e14;" onclick="acceptPooled()">Accept Pooled Ride</button>
                <button class="btn-driver" style="background-color: #6f42c1;" onclick="completeRide()">Complete Ride</button>
            </div>

            <div class="log-box" id="driverLog">
                <div class="log-entry">Waiting to connect...</div>
            </div>
        </div>

        <div class="panel">
            <h2 class="queue-header">📊 Queue View</h2>
            <p style="font-size: 0.8em; color: #888;">Updates every 2 seconds</p>
            <div id="queueContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Ride ID</th>
                            <th>VIP</th>
                            <th>Route</th>
                        </tr>
                    </thead>
                    <tbody id="queueTableBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
